<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArthaNavigate | Materi Pemula</title>
    <meta name="description" content="Materi lengkap literasi keuangan untuk pemula — dari dasar pengelolaan uang hingga perencanaan keuangan jangka panjang.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body class="bg-brand-cream text-slate-600 selection:bg-brand-green selection:text-white">

    <div id="navbar-root"></div>

    <main>
        <!-- ========== HERO ========== -->
        <section class="relative pt-32 pb-16 bg-white overflow-hidden">
            <div class="absolute inset-0 bg-grid-pattern opacity-40 pointer-events-none"></div>
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative">
                <div data-aos="fade-up">
                    <a href="pemula.html"
                        class="inline-flex items-center gap-2 text-xs font-bold text-brand-green uppercase tracking-widest mb-8 hover:gap-3 transition-all">
                        <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                        Kembali ke Jalur Pemula
                    </a>
                    <div class="section-label mb-4">
                        <span class="w-2 h-2 bg-brand-green rounded-full animate-pulse"></span>
                        <span id="materi-label">Materi Pemula</span>
                    </div>
                    <h1 class="font-serif text-4xl md:text-5xl font-bold tracking-tight leading-[1.1] mb-6" id="materi-title">
                        Memuat Materi...
                    </h1>
                    <p class="text-lg text-slate-500 max-w-2xl leading-relaxed" id="materi-subtitle">
                    </p>
                </div>
            </div>
        </section>

        <!-- ========== CONTENT ========== -->
        <section class="py-16 bg-brand-cream">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div id="materi-content" data-aos="fade-up">
                    <!-- Content injected by JS -->
                </div>
            </div>
        </section>

        <!-- ========== CHART ========== -->
        <section class="py-16 bg-white" id="chart-section" style="display:none;">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="harbor-card p-8" data-aos="fade-up">
                    <h3 class="font-serif text-2xl font-bold mb-2" id="chart-title"></h3>
                    <p class="text-sm text-slate-500 mb-6" id="chart-desc"></p>
                    <div class="relative" style="max-height: 400px;">
                        <canvas id="materi-chart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========== KEY TAKEAWAYS ========== -->
        <section class="py-16 bg-brand-cream" id="takeaways-section" style="display:none;">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div data-aos="fade-up">
                    <h3 class="font-serif text-2xl font-bold mb-6">💡 Poin Penting</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="takeaways-grid">
                    </div>
                </div>
            </div>
        </section>

        <!-- ========== NAVIGATION ========== -->
        <section class="py-12 bg-white">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center" data-aos="fade-up">
                    <a href="#" id="prev-topic" class="btn-secondary text-xs px-6 py-3" style="visibility:hidden;">
                        <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                        Sebelumnya
                    </a>
                    <a href="#" id="next-topic" class="btn-primary text-xs px-6 py-3">
                        Selanjutnya
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-root"></div>

    <script type="module" src="/src/js/pages/materi-pemula.js"></script>
</body>

</html>
