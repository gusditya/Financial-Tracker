<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warta Ekonomi | ArthaNavigate</title>
    <meta name="description"
        content="Monitor pergerakan ekonomi dunia dengan berita pilihan dari pusat finansial global melalui ArthaNavigate.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body class="bg-brand-cream text-slate-600 selection:bg-brand-green selection:text-white">

    <div id="navbar-root"></div>

    <main class="main-content pt-36 pb-20 bg-brand-cream">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <!-- Main Content -->
                <div class="lg:col-span-8">
                    <div class="mb-16" data-aos="fade-up">
                        <h1 class="font-serif text-5xl md:text-7xl font-bold mb-6">Warta <br /><span
                                class="italic font-normal text-brand-green">Ekonomi Global</span></h1>
                        <p class="text-sm font-serif italic text-slate-400 uppercase tracking-[0.3em]">Laporan Utama
                            Edisi 2025/2026</p>
                    </div>

                    <div id="main-news" class="space-y-16">
                        <!-- News items injected by JS -->
                    </div>
                </div>

                <!-- Sidebar Content -->
                <div class="lg:col-span-4 lg:border-l border-slate-200 lg:pl-12">
                    <div class="sticky top-32 space-y-12">
                        <div>
                            <h3
                                class="font-serif font-bold text-xl uppercase tracking-wider border-b border-slate-200 pb-2 mb-8">
                                Berita Terpopuler</h3>
                            <div id="sidebar-news" class="space-y-8">
                                <!-- Sidebar news items -->
                            </div>
                        </div>

                        <!-- Newsletter Mini-form -->
                        <div class="harbor-card p-8">
                            <h4 class="font-serif text-xl font-bold mb-4">Briefing Artha</h4>
                            <p class="text-xs text-slate-500 mb-6 leading-relaxed">Dapatkan ringkasan pasar modal setiap
                                pagi langsung di email Anda.</p>
                            <input type="email" placeholder="email@anda.com" class="harbor-input mb-4">
                            <button class="w-full btn-primary py-3">Berlangganan</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="footer-root"></div>
    </main>

    <script type="module" src="../js/pages/news.js"></script>
</body>

</html>
