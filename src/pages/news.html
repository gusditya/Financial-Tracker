<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warta Ekonomi | ArthaNavigate</title>
    <meta name="description"
        content="Monitor pergerakan ekonomi dunia dengan berita pilihan dari pusat finansial global melalui ArthaNavigate.">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-parchment text-charcoal selection:bg-bullion selection:text-white font-sans">

    <div id="navbar-root"></div>

    <main class="main-content pt-36 pb-20 bg-parchment">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <!-- Main Content -->
                <div class="lg:col-span-8">
                    <div class="mb-16" >
                        <h1 class="font-serif text-5xl md:text-7xl font-bold mb-6">Warta <br /><span
                                class="italic font-normal text-brand-green">Ekonomi Global</span></h1>
                        <p class="text-sm font-serif italic text-slate-400 uppercase tracking-[0.3em]">Laporan Utama
                            Edisi 2025/2026</p>
                    </div>

                    <div id="main-news" class="space-y-16">
                        <!-- News items injected by JS -->
                    </div>
                </div>

                <!-- Sidebar Content -->
                <div class="lg:col-span-4 lg:border-l border-slate-200 lg:pl-12">
                    <div class="sticky top-32 space-y-12">
                        <div>
                            <h3
                                class="font-serif font-bold text-xl uppercase tracking-wider border-b border-slate-200 pb-2 mb-8">
                                Berita Terpopuler</h3>
                            <div id="sidebar-news" class="space-y-8">
                                <!-- Sidebar news items -->
                            </div>
                        </div>

                        <!-- Newsletter Mini-form -->
                        <div class="harbor-card p-8">
                            <h4 class="font-serif text-xl font-bold mb-4">Briefing Artha</h4>
                            <p class="text-xs text-slate-500 mb-6 leading-relaxed">Dapatkan ringkasan pasar modal setiap
                                pagi langsung di email Anda.</p>
                            <input type="email" placeholder="email@anda.com" class="harbor-input mb-4">
                            <button class="w-full btn-primary py-3">Berlangganan</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="footer-root"></div>
    </main>

    <!-- News Modal -->
    <div id="news-modal" class="fixed inset-0 z-[200] bg-charcoal/80 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-parchment w-full max-w-4xl max-h-[90vh] rounded-[32px] overflow-hidden flex flex-col relative transform scale-95 transition-transform duration-300 shadow-2xl">
            <!-- Modal Header -->
            <div class="flex justify-between items-center p-6 md:p-8 border-b border-charcoal/10 bg-white">
                <span id="modal-category" class="text-[10px] font-bold text-brand-green uppercase tracking-widest bg-brand-green-light/20 px-3 py-1 rounded-full">Kategori</span>
                <button id="close-modal-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-charcoal/5 hover:bg-charcoal hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <!-- Modal Body -->
            <div class="overflow-y-auto p-6 md:p-12 scrollbar-hide">
                <h2 id="modal-title" class="font-serif text-3xl md:text-5xl font-bold mb-6 text-charcoal leading-tight">Judul Berita</h2>
                <div class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 mb-10 pb-6 border-b border-charcoal/10">
                    <span id="modal-author" class="text-charcoal">By Author</span>
                    <span>|</span>
                    <span id="modal-date">Date</span>
                </div>
                <img id="modal-image" src="" class="w-full h-auto aspect-video object-cover rounded-2xl mb-10 hidden" alt="News Image">
                <div id="modal-content" class="prose prose-lg prose-slate max-w-none text-charcoal/80 font-sans leading-relaxed">
                    <!-- HTML Content goes here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/news.js"></script>
</body>

</html>
